<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 600;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8; /* Azul estilo Google */
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1557b0;
        }
        #mensaje {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Registro</h2>
    <form id="userForm">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" required min="1" max="120" placeholder="Ej. 25">
        </div>
        <button type="submit">Guardar en Google Sheets</button>
    </form>
    <div id="mensaje"></div>
</div>

<script>
    // REEMPLAZA ESTA URL con la que te dará Google Apps Script en el paso 2
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx2d5jE4b9CwLzo0iNsaI8fwaFCJJRC2FZIcPTDyvyA6sTt_tgNjXOiTicCh3bYkvNNww/exec";

    document.getElementById('userForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Evita que la página se recargue
        
        const nombre = document.getElementById('nombre').value;
        const edad = document.getElementById('edad').value;
        const divMensaje = document.getElementById('mensaje');
        
        divMensaje.style.color = 'orange';
        divMensaje.textContent = 'Enviando...';

        // Estructura de los datos
        const datos = {
            nombre: nombre,
            edad: edad
        };

        // Petición POST a la Web App de Google
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Evita problemas de CORS al enviar a Google
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datos)
        })
        .then(() => {
            divMensaje.style.color = 'green';
            divMensaje.textContent = '¡Datos guardados con éxito!';
            document.getElementById('userForm').reset(); // Limpia el formulario
        })
        .catch(error => {
            divMensaje.style.color = 'red';
            divMensaje.textContent = 'Error al guardar los datos.';
            console.error('Error:', error);
        });
    });
</script>

</body>
</html>
